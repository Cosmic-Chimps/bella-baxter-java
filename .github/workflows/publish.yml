name: Publish Java SDK (Maven Central)

# Publishes io.bella-baxter:bella-baxter-sdk to Maven Central.
# Users add to their pom.xml:
#   <dependency>
#     <groupId>io.bella-baxter</groupId>
#     <artifactId>bella-baxter-sdk</artifactId>
#     <version>VERSION</version>
#   </dependency>
#
# Triggered by release-sdk.yml creating a tag on this repo.

on:
  push:
    tags:
      - 'v*'

env:
  SDK_FOLDER: .

jobs:
  publish:
    name: Publish bella-baxter-java
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install kiota
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
      - run: dotnet tool install --global Microsoft.OpenApi.Kiota --version 1.30.0

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing bella-baxter-java $VERSION"

      - name: Set production API URL
        run: |
          BELLA_BAXTER_API_URL="${{ vars.BELLA_BAXTER_API_URL || 'https://api.bella-baxter.io' }}"
          if [ "$BELLA_BAXTER_API_URL" != "https://api.bella-baxter.io" ]; then
            grep -rl 'https://api.bella-baxter.io' . --include='*.java' \
              | xargs sed -i "s|https://api.bella-baxter.io|${BELLA_BAXTER_API_URL}|g"
          fi

      - name: Generate Kiota Java client
        run: |
          kiota generate \
            --language Java \
            --class-name BellaClient \
            --namespace-name io.bellabaxter.generated \
            --openapi openapi.json \
            --output src/main/java/io/bellabaxter/generated \
            --exclude-backward-compatible \
            --clean-output \
            --log-level Warning

      - name: Verify VERSION file matches tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          FILE_VERSION=$(cat VERSION 2>/dev/null || echo "")
          if [ "$FILE_VERSION" != "$VERSION" ]; then
            echo "::error::VERSION file has '$FILE_VERSION' but tag is '$VERSION' — run release-sdk.yml first"
            exit 1
          fi
          echo "✓ VERSION file $FILE_VERSION matches tag $VERSION"

      - name: Set pom.xml version from tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mvn -q versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false
          echo "Set pom.xml version to $VERSION"

      - name: Import GPG key
        run: |
          echo "${{ secrets.BELLA_GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "${{ secrets.BELLA_GPG_FINGERPRINT }}:6:" | gpg --import-ownertrust

      - name: Build, sign and publish to Maven Central
        run: mvn -B deploy -DskipTests
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.BELLA_GPG_PASSPHRASE }}
          CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Java SDK ${{ github.ref_name }}"
          generate_release_notes: true

  notify:
    runs-on: ubuntu-latest
    needs: publish
    if: always()
    steps:
      - uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            text: "${{ needs.publish.result == 'success' && '✅' || needs.publish.result == 'failure' && '❌' || '⚠️' }} *SDK Java (Maven Central) publish ${{ github.ref_name }}*: ${{ needs.publish.result }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
