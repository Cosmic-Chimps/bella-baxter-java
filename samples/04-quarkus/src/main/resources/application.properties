quarkus.application.name=bella-quarkus-sample
quarkus.http.port=${PORT:8080}

# Bella Baxter auto-configuration (bella-baxter-quarkus)
# BellaConfigSource is auto-registered via META-INF/services — no boilerplate required.
bellabaxter.url=${BELLABAXTER_URL:https://api.bella-baxter.io}
bellabaxter.api-key=${BELLABAXTER_API_KEY:${BELLA_API_KEY:}}

# Optional: enable background polling for live secret refresh
# bellabaxter.polling.enabled=true
# bellabaxter.polling.interval-seconds=30
# bellabaxter.polling.fallback-on-error=true
