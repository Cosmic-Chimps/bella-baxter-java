spring.application.name=bella-spring-boot-sample
server.port=${PORT:8080}

# Bella Baxter auto-configuration (bella-baxter-spring-boot)
bellabaxter.url=https://api.bella-baxter.io
bellabaxter.api-key=${BELLA_API_KEY:}

# Optional: enable background polling for live secret refresh
# bellabaxter.polling.enabled=true
# bellabaxter.polling.interval-seconds=30
# bellabaxter.polling.fallback-on-error=true

# Spring datasource — uses DATABASE_URL injected by Bella Baxter auto-configuration
# spring.datasource.url=${DATABASE_URL}
